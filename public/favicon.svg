<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- Husk leaves at top, splayed -->
  <g class="ink">
    <!-- Left husk -->
    <path d="M52 14 C 38 18, 30 30, 30 44 C 36 36, 46 32, 54 32 Z"/>
    <!-- Right husk -->
    <path d="M76 14 C 90 18, 98 30, 98 44 C 92 36, 82 32, 74 32 Z"/>
    <!-- Center husk -->
    <path d="M64 8 C 60 16, 56 24, 56 34 L 72 34 C 72 24, 68 16, 64 8 Z"/>
  </g>

  <!-- Cob body, kernel grid in a rounded ear shape -->
  <g class="ink">
    <!-- Outline of the ear (rounded rectangle, tapered at bottom) -->
    <path d="M44 32 C 44 30, 46 30, 50 30 L 78 30 C 82 30, 84 30, 84 32 L 84 92 C 84 108, 76 118, 64 118 C 52 118, 44 108, 44 92 Z" fill="currentColor"/>
  </g>

  <!-- Kernels — punched out as cream-colored rounded squares in offset rows -->
  <g class="kernels">
    <!-- Row 1 -->
    <rect x="50" y="38" width="9" height="8" rx="2"/>
    <rect x="60" y="38" width="9" height="8" rx="2"/>
    <rect x="70" y="38" width="9" height="8" rx="2"/>
    <!-- Row 2 (offset) -->
    <rect x="48" y="48" width="9" height="8" rx="2"/>
    <rect x="58" y="48" width="9" height="8" rx="2"/>
    <rect x="68" y="48" width="9" height="8" rx="2"/>
    <rect x="78" y="48" width="9" height="8" rx="2"/>
    <!-- Row 3 -->
    <rect x="50" y="58" width="9" height="8" rx="2"/>
    <rect x="60" y="58" width="9" height="8" rx="2"/>
    <rect x="70" y="58" width="9" height="8" rx="2"/>
    <!-- Row 4 (offset) -->
    <rect x="48" y="68" width="9" height="8" rx="2"/>
    <rect x="58" y="68" width="9" height="8" rx="2"/>
    <rect x="68" y="68" width="9" height="8" rx="2"/>
    <rect x="78" y="68" width="9" height="8" rx="2"/>
    <!-- Row 5 -->
    <rect x="50" y="78" width="9" height="8" rx="2"/>
    <rect x="60" y="78" width="9" height="8" rx="2"/>
    <rect x="70" y="78" width="9" height="8" rx="2"/>
    <!-- Row 6 (offset, narrowing) -->
    <rect x="52" y="88" width="9" height="8" rx="2"/>
    <rect x="62" y="88" width="9" height="8" rx="2"/>
    <rect x="72" y="88" width="9" height="8" rx="2"/>
    <!-- Row 7 (narrowing toward tip) -->
    <rect x="54" y="98" width="9" height="8" rx="2"/>
    <rect x="64" y="98" width="9" height="8" rx="2"/>
    <!-- Row 8 (tip) -->
    <rect x="58" y="108" width="9" height="8" rx="2"/>
  </g>

  <style>
    .ink path { fill: #1a1a1a; }
    .kernels rect { fill: #f5ecd8; }
    @media (prefers-color-scheme: dark) {
      .ink path { fill: #f5ecd8; }
      .kernels rect { fill: #1a1a1a; }
    }
  </style>
</svg>
